<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 To-Do List App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .stat {
            text-align: center;
            padding: 10px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #6c757d;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-section {
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
        }

        .input-section input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .input-section input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .filter-section {
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #e9ecef;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 15px;
            border: 2px solid #e9ecef;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .filter-btn:hover:not(.active) {
            border-color: #667eea;
            color: #667eea;
        }

        .tasks-section {
            max-height: 500px;
            overflow-y: auto;
            padding: 15px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .task-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #999;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .task-content {
            flex: 1;
            min-width: 0;
        }

        .task-text {
            font-size: 14px;
            font-weight: 500;
            color: #212529;
            word-break: break-word;
        }

        .task-priority {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 4px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .priority-high {
            background: #ffe0e0;
            color: #c92a2a;
        }

        .priority-medium {
            background: #fff3bf;
            color: #d9a804;
        }

        .priority-low {
            background: #d3f9d8;
            color: #2b8a3e;
        }

        .task-actions {
            display: flex;
            gap: 5px;
        }

        .btn-small {
            width: 32px;
            height: 32px;
            padding: 0;
            border: none;
            background: #e9ecef;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-small:hover {
            background: #dee2e6;
            transform: scale(1.1);
        }

        .btn-edit {
            color: #0066cc;
        }

        .btn-delete {
            color: #dc3545;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6c757d;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 14px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease-out;
        }

        .modal-header {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #212529;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #495057;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-cancel {
            flex: 1;
            padding: 12px;
            background: #e9ecef;
            color: #495057;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-cancel:hover {
            background: #dee2e6;
        }

        .btn-save {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .clear-completed {
            padding: 15px 20px;
            text-align: center;
            border-top: 1px solid #e9ecef;
        }

        .btn-clear {
            background: #fff3cd;
            color: #856404;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-clear:hover {
            background: #ffeaa7;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .tasks-section {
            scrollbar-width: thin;
            scrollbar-color: #ccc transparent;
        }

        .tasks-section::-webkit-scrollbar {
            width: 6px;
        }

        .tasks-section::-webkit-scrollbar-track {
            background: transparent;
        }

        .tasks-section::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .tasks-section::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        @media (max-width: 600px) {
            .container {
                border-radius: 0;
                max-width: 100%;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            .tasks-section {
                flex: 1;
            }

            .header h1 {
                font-size: 24px;
            }

            .stats {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                padding: 15px;
            }

            .stat {
                padding: 8px;
            }

            .stat-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 My Tasks</h1>
            <p>Stay organized and productive</p>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="completedCount">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="pendingCount">0</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>

        <div class="input-section">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Add a new task..."
                autocomplete="off"
            >
            <button class="btn btn-primary" onclick="openAddModal()">Add</button>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" onclick="filterTasks('all')">All</button>
            <button class="filter-btn" onclick="filterTasks('active')">Active</button>
            <button class="filter-btn" onclick="filterTasks('completed')">Completed</button>
        </div>

        <div class="tasks-section" id="tasksList"></div>

        <div class="clear-completed" id="clearSection" style="display: none;">
            <button class="btn-clear" onclick="clearCompleted()">Clear All Completed</button>
        </div>
    </div>

    <!-- Add/Edit Task Modal -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle">Add New Task</div>
            <form onsubmit="saveTask(event)">
                <div class="form-group">
                    <label for="taskText">Task Description</label>
                    <input 
                        type="text" 
                        id="taskText" 
                        placeholder="What do you need to do?"
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="taskPriority">Priority</label>
                    <select id="taskPriority" required>
                        <option value="low">🟢 Low</option>
                        <option value="medium" selected>🟡 Medium</option>
                        <option value="high">🔴 High</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-save">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <div class="modal-header">Delete Task?</div>
            <p style="margin-bottom: 20px; color: #6c757d;">Are you sure you want to delete this task?</p>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeConfirmModal()">Cancel</button>
                <button class="btn-save" style="background: #dc3545;" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <script>
        let tasks = [];
        let currentFilter = 'all';
        let editingId = null;
        let deleteId = null;

        // Local Storage Functions
        function loadTasks() {
            const saved = localStorage.getItem('tasks');
            tasks = saved ? JSON.parse(saved) : [];
            renderTasks();
            updateStats();
        }

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        // Task Management Functions
        function openAddModal() {
            const input = document.getElementById('taskInput');
            editingId = null;
            document.getElementById('modalTitle').textContent = 'Add New Task';
            document.getElementById('taskText').value = input.value || '';
            document.getElementById('taskPriority').value = 'medium';
            document.getElementById('taskModal').classList.add('active');
            document.getElementById('taskText').focus();
        }

        function openEditModal(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            
            editingId = id;
            document.getElementById('modalTitle').textContent = 'Edit Task';
            document.getElementById('taskText').value = task.text;
            document.getElementById('taskPriority').value = task.priority;
            document.getElementById('taskModal').classList.add('active');
            document.getElementById('taskText').focus();
        }

        function closeModal() {
            document.getElementById('taskModal').classList.remove('active');
            document.getElementById('taskInput').value = '';
        }

        function saveTask(e) {
            e.preventDefault();
            const text = document.getElementById('taskText').value.trim();
            const priority = document.getElementById('taskPriority').value;

            if (!text) return;

            if (editingId) {
                const task = tasks.find(t => t.id === editingId);
                if (task) {
                    task.text = text;
                    task.priority = priority;
                }
            } else {
                tasks.push({
                    id: Date.now(),
                    text: text,
                    priority: priority,
                    completed: false,
                    createdAt: new Date().toISOString()
                });
            }

            saveTasks();
            renderTasks();
            updateStats();
            closeModal();
            document.getElementById('taskInput').value = '';
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        function openDeleteConfirm(id) {
            deleteId = id;
            document.getElementById('confirmModal').classList.add('active');
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('active');
            deleteId = null;
        }

        function confirmDelete() {
            deleteTask(deleteId);
            closeConfirmModal();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
            updateStats();
        }

        function clearCompleted() {
            tasks = tasks.filter(t => !t.completed);
            saveTasks();
            renderTasks();
            updateStats();
        }

        function filterTasks(filter) {
            currentFilter = filter;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderTasks();
        }

        function renderTasks() {
            const tasksList = document.getElementById('tasksList');
            let filtered = tasks;

            if (currentFilter === 'active') {
                filtered = tasks.filter(t => !t.completed);
            } else if (currentFilter === 'completed') {
                filtered = tasks.filter(t => t.completed);
            }

            if (filtered.length === 0) {
                tasksList.innerHTML = `
                    <div class="empty-state">
                        <p>📭 No tasks yet. Add one to get started!</p>
                    </div>
                `;
            } else {
                tasksList.innerHTML = filtered.map(task => `
                    <div class="task-item ${task.completed ? 'completed' : ''}">
                        <input 
                            type="checkbox" 
                            class="task-checkbox" 
                            ${task.completed ? 'checked' : ''}
                            onchange="toggleTask(${task.id})"
                        >
                        <div class="task-content">
                            <div class="task-text">${escapeHtml(task.text)}</div>
                            <div class="task-priority priority-${task.priority}">
                                ${task.priority}
                            </div>
                        </div>
                        <div class="task-actions">
                            <button class="btn-small btn-edit" onclick="openEditModal(${task.id})" title="Edit">✏️</button>
                            <button class="btn-small btn-delete" onclick="openDeleteConfirm(${task.id})" title="Delete">🗑️</button>
                        </div>
                    </div>
                `).join('');
            }

            // Show/hide clear button
            const hasCompleted = tasks.some(t => t.completed);
            document.getElementById('clearSection').style.display = hasCompleted ? 'block' : 'none';
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('pendingCount').textContent = pending;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Event Listeners
        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                openAddModal();
            }
        });

        document.getElementById('taskModal').addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Initialize
        window.addEventListener('load', loadTasks);
    </script>
</body>
</html>
